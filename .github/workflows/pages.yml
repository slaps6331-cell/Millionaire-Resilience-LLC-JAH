name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  # Allow manual re-deployment from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; never cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the static docs/ folder on main
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
