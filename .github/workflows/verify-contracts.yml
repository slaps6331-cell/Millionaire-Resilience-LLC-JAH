name: Verify Deployed Contracts

on:
  workflow_run:
    workflows:
      - "Deploy Smart Contracts"
    types:
      - completed
  workflow_dispatch:
    inputs:
      network:
        description: "Network to verify contracts on"
        required: true
        default: "both"
        type: choice
        options:
          - story
          - base
          - both

concurrency:
  group: verify-${{ github.event.inputs.network || 'both' }}
  cancel-in-progress: false

jobs:
  verify-story:
    name: Verify on StoryScan (Chain 1514)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && (inputs.network == 'story' || inputs.network == 'both'))
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile contracts (needed for verification artifacts)
        run: npm run contracts:compile

      - name: Verify contracts on StoryScan
        env:
          STORYSCAN_API_KEY: ${{ secrets.STORYSCAN_API_KEY }}
          STORY_RPC_URL: ${{ vars.STORY_RPC_URL || 'https://mainnet.storyrpc.io' }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: npm run contracts:verify:story || echo "::warning::StoryScan verification returned non-zero exit — check logs above."

      - name: Query StoryScan for deployment status
        env:
          STORYSCAN_API_KEY: ${{ secrets.STORYSCAN_API_KEY }}
        run: |
          echo "=== Story Protocol Deployment Verification ==="
          if [[ -f deployment-registry.json ]]; then
            node -e "
              const fs = require('fs');
              const reg = JSON.parse(fs.readFileSync('deployment-registry.json', 'utf8'));
              const story = reg['story-mainnet'];
              if (story && story.contracts && Object.keys(story.contracts).length > 0) {
                console.log('Contracts on Story Protocol (Chain 1514):');
                for (const [name, addr] of Object.entries(story.contracts)) {
                  console.log('  ' + name + ': ' + addr);
                  console.log('  Explorer: https://www.storyscan.io/address/' + addr);
                }
              } else {
                console.log('No Story Protocol contracts recorded in registry yet.');
              }
            "
          else
            echo "deployment-registry.json not found."
          fi

      - name: Validate Story Protocol IP registration
        env:
          STORY_RPC_URL: ${{ vars.STORY_RPC_URL || 'https://mainnet.storyrpc.io' }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          STORY_PROTOCOL_REGISTRY: ${{ vars.STORY_PROTOCOL_REGISTRY || '0x1a9d0d28a0422F26D31Be72Edc6f13ea4371E11B' }}
          MR_PARENT_IPID: ${{ vars.MR_PARENT_IPID }}
        run: |
          echo "=== Story Protocol IP Registration Check ==="
          echo "Registry: ${STORY_PROTOCOL_REGISTRY}"
          echo "Parent IPID: ${MR_PARENT_IPID:-not set}"
          echo "Explorer: https://www.storyscan.io/address/${STORY_PROTOCOL_REGISTRY}"

  verify-base:
    name: Verify on Basescan (Chain 8453)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && (inputs.network == 'base' || inputs.network == 'both'))
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile contracts
        run: npm run contracts:compile

      - name: Verify contracts on Basescan
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          BASE_RPC_URL: ${{ vars.BASE_RPC_URL || 'https://mainnet.base.org' }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: npm run contracts:verify:base || echo "::warning::Basescan verification returned non-zero exit — check logs above."

      - name: Query Basescan for deployment status
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          echo "=== Base L2 Deployment Verification ==="
          if [[ -f deployment-registry.json ]]; then
            node -e "
              const fs = require('fs');
              const reg = JSON.parse(fs.readFileSync('deployment-registry.json', 'utf8'));
              const base = reg['base-mainnet'];
              if (base && base.contracts && Object.keys(base.contracts).length > 0) {
                console.log('Contracts on Base L2 (Chain 8453):');
                for (const [name, addr] of Object.entries(base.contracts)) {
                  console.log('  ' + name + ': ' + addr);
                  console.log('  Explorer: https://basescan.org/address/' + addr);
                }
              } else {
                console.log('No Base L2 contracts recorded in registry yet.');
              }
            "
          else
            echo "deployment-registry.json not found."
          fi

      - name: Validate Morpho Blue market parameters
        env:
          BASE_RPC_URL: ${{ vars.BASE_RPC_URL || 'https://mainnet.base.org' }}
          MORPHO_BLUE: ${{ vars.MORPHO_BLUE || '0xBBBBBbbBBb9cC5e90e3b3Af64bdAF62C37EEFFCb' }}
        run: |
          echo "=== Morpho Blue Market Validation ==="
          echo "Contract: ${MORPHO_BLUE}"
          echo "Explorer: https://basescan.org/address/${MORPHO_BLUE}"

  generate-verification-report:
    name: Generate Verification Report
    runs-on: ubuntu-latest
    needs: [verify-story, verify-base]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate verification report
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          STORY_STATUS="${{ needs.verify-story.result }}"
          BASE_STATUS="${{ needs.verify-base.result }}"

          node -e "
            const fs = require('fs');
            const registry = JSON.parse(fs.readFileSync('deployment-registry.json', 'utf8'));

            registry.verification = {
              'storyscan-verified': '${STORY_STATUS}' === 'success',
              'basescan-verified': '${BASE_STATUS}' === 'success',
              'story-protocol-registered': '${STORY_STATUS}' === 'success',
              'morpho-validated': '${BASE_STATUS}' === 'success',
              'last-verified': '${TIMESTAMP}',
              'run-id': '${{ github.run_id }}'
            };

            fs.writeFileSync('deployment-registry.json', JSON.stringify(registry, null, 2));
            console.log('Verification status updated:', JSON.stringify(registry.verification, null, 2));
          "

      - name: Commit verification report
        uses: EndBug/add-and-commit@v9
        with:
          add: "deployment-registry.json"
          message: "chore: update verification status in deployment-registry.json [skip ci]"
          default_author: github_actions

      - name: Print verification summary
        run: |
          echo "=================================================="
          echo "        CONTRACT VERIFICATION SUMMARY"
          echo "=================================================="
          echo "Story Protocol (Chain 1514):"
          echo "  StoryScan: https://www.storyscan.io"
          echo "  Job result: ${{ needs.verify-story.result }}"
          echo ""
          echo "Base L2 (Chain 8453):"
          echo "  Basescan: https://basescan.org"
          echo "  Job result: ${{ needs.verify-base.result }}"
          echo "=================================================="
