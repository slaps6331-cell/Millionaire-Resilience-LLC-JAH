name: Pinata IPFS Document Sync

on:
  push:
    branches:
      - main
    paths:
      - "documents/**"
  workflow_dispatch:
    inputs:
      pin_ucc1:
        description: "Pin primary UCC-1 filing document"
        required: false
        default: true
        type: boolean
      pin_auxiliary:
        description: "Pin auxiliary corporate documents bundle"
        required: false
        default: true
        type: boolean
      pin_patents:
        description: "Pin patent portfolio CIDs"
        required: false
        default: true
        type: boolean
      dry_run:
        description: "Dry run (validate files, do not upload)"
        required: false
        default: false
        type: boolean

concurrency:
  group: pinata-sync
  cancel-in-progress: false

jobs:
  pin-documents:
    name: Pin UCC-1 & Corporate Documents to Pinata
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate Pinata credentials
        if: ${{ !inputs.dry_run }}
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
        run: |
          if [[ -z "$PINATA_JWT" ]]; then
            echo "::error::PINATA_JWT secret is not set. Add it via Settings → Secrets → Actions."
            exit 1
          fi
          echo "✅ Pinata credentials present"

      - name: Dry-run — list documents to be pinned
        if: ${{ inputs.dry_run }}
        run: |
          echo "=== DRY RUN: Documents that would be pinned ==="
          if [[ -d documents ]]; then
            find documents -type f | sort
          else
            echo "(no documents/ directory found — create it and add your files)"
          fi

      - name: Pin documents to Pinata
        if: ${{ !inputs.dry_run }}
        id: pin
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
          PINATA_GATEWAY_NAME: ${{ vars.PINATA_GATEWAY_NAME }}
          UCC1_FILING_NUMBER: ${{ vars.UCC1_FILING_NUMBER }}
          PIN_UCC1: ${{ inputs.pin_ucc1 || 'true' }}
          PIN_AUXILIARY: ${{ inputs.pin_auxiliary || 'true' }}
          PIN_PATENTS: ${{ inputs.pin_patents || 'true' }}
        run: node scripts/pin-to-pinata.cjs

      - name: Update deployment-registry.json with new CIDs
        if: ${{ !inputs.dry_run }}
        env:
          PINATA_GATEWAY_NAME: ${{ vars.PINATA_GATEWAY_NAME }}
        run: |
          # Read any CIDs written by pin-to-pinata.cjs and merge into registry
          if [[ -f pinata-cids.json ]]; then
            node -e "
              const fs = require('fs');
              const registry = JSON.parse(fs.readFileSync('deployment-registry.json', 'utf8'));
              const cids = JSON.parse(fs.readFileSync('pinata-cids.json', 'utf8'));
              registry['ipfs-documents'] = { ...registry['ipfs-documents'], ...cids };
              registry['ipfs-documents']['last-synced'] = new Date().toISOString();
              fs.writeFileSync('deployment-registry.json', JSON.stringify(registry, null, 2));
              console.log('Registry updated with CIDs:', JSON.stringify(cids, null, 2));
            "
          else
            echo "No new CIDs written by pin script — registry unchanged."
          fi

      - name: Commit updated registry
        if: ${{ !inputs.dry_run }}
        uses: EndBug/add-and-commit@v9
        with:
          add: "deployment-registry.json"
          message: "chore: update IPFS CIDs in deployment-registry.json [skip ci]"
          default_author: github_actions

      - name: Create deployment summary issue
        if: ${{ !inputs.dry_run && always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GATEWAY="${{ vars.PINATA_GATEWAY_NAME }}"
          GATEWAY_URL="${GATEWAY:+https://${GATEWAY}.mypinata.cloud/ipfs/}"
          GATEWAY_URL="${GATEWAY_URL:-https://gateway.pinata.cloud/ipfs/}"

          BODY="## 📌 Pinata IPFS Sync Summary

          **Run**: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Triggered by**: \`${{ github.event_name }}\`
          **Branch**: \`${{ github.ref_name }}\`
          **Timestamp**: $(date -u '+%Y-%m-%dT%H:%M:%SZ')

          ### Documents Pinned
          | Document | Status |
          |---|---|
          | UCC-1 Financing Statement | ${{ inputs.pin_ucc1 == true && '✅ Processed' || '⏭ Skipped' }} |
          | Auxiliary Corporate Bundle | ${{ inputs.pin_auxiliary == true && '✅ Processed' || '⏭ Skipped' }} |
          | Patent Portfolio CIDs | ${{ inputs.pin_patents == true && '✅ Processed' || '⏭ Skipped' }} |

          See \`deployment-registry.json\` for the recorded CIDs."

          gh issue create \
            --title "📌 IPFS Sync #${{ github.run_number }}: $(date -u '+%Y-%m-%d')" \
            --body "$BODY" \
            --label "ipfs,deployment" \
            || echo "Note: Could not create issue (labels may not exist). Continuing."

  record-known-cids:
    name: Record Pre-Pinned IPFS CIDs to Registry
    runs-on: ubuntu-latest
    needs: pin-documents
    if: ${{ !inputs.dry_run || github.event_name == 'push' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Merge known CIDs from .env.example into registry
        run: |
          node -e "
            const fs = require('fs');
            const registry = JSON.parse(fs.readFileSync('deployment-registry.json', 'utf8'));

            // CIDs already pinned and verified (sourced from .env.example)
            const knownCIDs = {
              'ucc1-filing': 'bafkreialofdl6qhrgyomohyo6giijf7stzl26r6sbvq6gnwakgqpbqoe4a',
              'ucc1-auxiliary': 'bafybeidkp74w2idrwkg2qey66uepfaes5ekonxjqt62uztyxawii7yye7y',
              'gladiator-cert-of-org': 'bafybeiba2j4g34bizjjm26qznc2pf4upgotffrcwjtkw6lj3qa6squrzpu',
              'gladiator-notice-of-filing': 'bafkreifbikc26xs2cu2mvsghzlrginwm6icqotdp4ntsvq3sn6h4flrhhm',
              'mr-articles-of-incorporation': 'bafkreifxiesrze736sxhvsa5op64q6f3ddvv3rismnvd75wi3yfqilu4py',
              'mr-ein-letter': 'bafkreihz5zpp33pimzckaey64mht2vezlbzngoxe46urrfctzqvjvsdboe',
              'slaps-articles': 'bafkreic3n6bdf25tobljqbjxzvzkbch6s7xkqq5yehmyt3zju4de7ey52u',
              'slaps-ein-letter': 'bafkreifnuwchbvbolmhbgionvsltdi3edzasfqytd4zzqlvu42m5m4jhei',
              'rbw-ein-letter': 'bafkreid77fuxwqtwyku5syp3dswmy75rymvxh6v3tf7rfrzqbrizoutxtu',
              'nm-sos-receipt': 'bafkreigjsqx6d47sgqwkjxgtt3qrjnoz3hdth4hqk7qnxflqog2ikjs2kq',
              'beneficial-owner-id': 'bafkreie5spkgxxhmafdqylwyfplx37jqhcjrs3es3neasgcnynzgkg5mzi',
              'patentsight-portfolio': 'bafkreibxqnmhir5iifpboxdv5ndltm5vnbplso4ndtcuzfnanykudrwdbu',
              'patentsight-mr': 'bafkreihls2yoi265uxzmcmh7wzk2ytyo5yvopmb4jib4blw4nptlchivqm',
              'patentsight-slaps': 'bafkreiflmhdsflvv53e24mo2woafdgecpkvfljcbm5heafnzdxzbj5ct4i',
              'iplytics-sep-declaration': 'bafkreiej7wfskl53hxo4j47g55bxjkyyulihovjjtpjvtf264kfoddxc5i'
            };

            registry['ipfs-documents'] = { ...knownCIDs, ...registry['ipfs-documents'] };
            fs.writeFileSync('deployment-registry.json', JSON.stringify(registry, null, 2));
            console.log('Registry updated with', Object.keys(knownCIDs).length, 'known CIDs');
          "

      - name: Commit registry with known CIDs
        uses: EndBug/add-and-commit@v9
        with:
          add: "deployment-registry.json"
          message: "chore: record known IPFS CIDs in deployment-registry.json [skip ci]"
          default_author: github_actions
