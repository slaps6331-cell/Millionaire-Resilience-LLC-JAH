name: Check Smart Contracts

on:
  push:
    branches: ["**"]
    paths:
      - "contracts/**"
      - "hardhat.config.cjs"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/check-contracts.yml"
      - ".github/workflows/deploy-contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "hardhat.config.cjs"
      - "scripts/**"
      - "package.json"

jobs:
  compile:
    name: Compile Contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile contracts
        run: npm run contracts:compile

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: artifacts/
          retention-days: 7

  test-deploy:
    name: Test Local Deployment
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run local deployment test
        run: node scripts/test-deploy.cjs
