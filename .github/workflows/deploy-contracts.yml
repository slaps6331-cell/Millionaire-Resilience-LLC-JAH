name: Deploy Smart Contracts

on:
  # Auto-deploy both Story Protocol and Base L2 whenever changes land on main.
  push:
    branches:
      - main

  # Manual override: choose network, verification, and dry-run options.
  workflow_dispatch:
    inputs:
      network:
        description: "Target network for deployment"
        required: true
        default: "both"
        type: choice
        options:
          - story
          - base
          - mainnet
          - both
          - all
      verify:
        description: "Verify contracts after deployment"
        required: true
        default: true
        type: boolean
      dry_run:
        description: "Dry run (compile only, do not deploy)"
        required: true
        default: false
        type: boolean

# Only allow one deployment workflow to run at a time.
# Push events use 'both' as the concurrency key; workflow_dispatch uses the chosen network.
concurrency:
  group: deploy-${{ github.event.inputs.network || 'both' }}
  cancel-in-progress: false

jobs:
  compile:
    name: Compile Contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifacts-key: ${{ steps.artifacts.outputs.key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile contracts
        run: npm run contracts:compile

      - name: Set artifacts key
        id: artifacts
        run: echo "key=artifacts-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ github.sha }}
          path: artifacts/
          retention-days: 30

  deploy-story:
    name: Deploy to Story Protocol (Chain 1514)
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
    if: |
      github.event_name == 'push' ||
      (!inputs.dry_run && (inputs.network == 'story' || inputs.network == 'both' || inputs.network == 'all'))
    environment: story-mainnet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download compiled artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-${{ github.sha }}
          path: artifacts/

      - name: Deploy contracts to Story Protocol
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          # STORY_RPC_URL is built from ALCHEMY_API_KEY when available (recommended).
          # Fall back to STORY_RPC_URL secret, then the public endpoint.
          STORY_RPC_URL: ${{ secrets.ALCHEMY_API_KEY && format('https://story-mainnet.g.alchemy.com/v2/{0}', secrets.ALCHEMY_API_KEY) || secrets.STORY_RPC_URL || 'https://mainnet.storyrpc.io' }}
          STORYSCAN_API_KEY: ${{ secrets.STORYSCAN_API_KEY }}
          # Pinata / IPFS credentials — used by deployment scripts that pin or fetch
          # documents from IPFS via the Pinata gateway.
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_GATEWAY_TOKEN: ${{ secrets.PINATA_GATEWAY_TOKEN }}
          PINATA_GATEWAY_NAME: ${{ vars.PINATA_GATEWAY_NAME }}
          # Coinbase CDP credentials — used to authenticate with Coinbase Developer Platform APIs.
          COINBASE_API_KEY_NAME: ${{ secrets.COINBASE_API_KEY_NAME }}
          COINBASE_API_KEY_PRIVATE_KEY: ${{ secrets.COINBASE_API_KEY_PRIVATE_KEY }}
        run: npm run contracts:deploy:story

      - name: Verify contracts on StoryScan
        if: inputs.verify || github.event_name == 'push'
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          # STORY_RPC_URL is built from ALCHEMY_API_KEY when available (recommended).
          # Fall back to STORY_RPC_URL secret, then the public endpoint.
          STORY_RPC_URL: ${{ secrets.ALCHEMY_API_KEY && format('https://story-mainnet.g.alchemy.com/v2/{0}', secrets.ALCHEMY_API_KEY) || secrets.STORY_RPC_URL || 'https://mainnet.storyrpc.io' }}
          STORYSCAN_API_KEY: ${{ secrets.STORYSCAN_API_KEY }}
        run: npm run contracts:verify:story

      - name: Generate valuation attestation hashes
        run: npm run contracts:attestation-hashes

      - name: Post-deployment orchestration (Story Protocol)
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          STORY_RPC_URL: ${{ secrets.ALCHEMY_API_KEY && format('https://story-mainnet.g.alchemy.com/v2/{0}', secrets.ALCHEMY_API_KEY) || secrets.STORY_RPC_URL || 'https://mainnet.storyrpc.io' }}
          UCC1_FILING_HASH: "bafkreialofdl6qhrgyomohyo6giijf7stzl26r6sbvq6gnwakgqpbqoe4a"
          UCC1_AUXILIARY_DOCS: "bafybeidkp74w2idrwkg2qey66uepfaes5ekonxjqt62uztyxawii7yye7y"
          UCC1_FINANCING_STATEMENT_CID: ${{ vars.UCC1_FINANCING_STATEMENT_CID || 'bafkreidomwlsf5wabkvhvf63jq424t65mffhnftd4t6spnmhh5t64jn2bu' }}
          UCC1_FILING_NUMBER: ${{ vars.UCC1_FILING_NUMBER || '20260000078753' }}
          UCC1_JURISDICTION: "New Mexico Secretary of State"
          THIRDWEB_WALLET_ADDRESS: ${{ vars.THIRDWEB_WALLET_ADDRESS || '0xCD67f7e86A1397aBc33C473c58662BEB83b7a667' }}
          COINBASE_WALLET_ADDRESS: ${{ vars.COINBASE_WALLET_ADDRESS || '0xdc2afcd0a97c1e878fdd64497806e52cc530f02a' }}
          COINBASE_API_KEY_NAME: ${{ secrets.COINBASE_API_KEY_NAME }}
          COINBASE_API_KEY_PRIVATE_KEY: ${{ secrets.COINBASE_API_KEY_PRIVATE_KEY }}
          # Thirdweb SDK credentials
          THIRDWEB_CLIENT_ID: ${{ secrets.THIRDWEB_CLIENT_ID }}
          THIRDWEB_SECRET_KEY: ${{ secrets.THIRDWEB_SECRET_KEY }}
          # Pinata / IPFS credentials
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_GATEWAY_TOKEN: ${{ secrets.PINATA_GATEWAY_TOKEN }}
          PINATA_GATEWAY_NAME: ${{ vars.PINATA_GATEWAY_NAME }}
          # Corporate document IPFS CIDs — these are network-agnostic but must be
          # set at the step level because ${{ vars.X || 'default' }} expressions are
          # only supported within job/step env blocks, not at the workflow level.
          IPFS_GLADIATOR_CERT_CID: ${{ vars.IPFS_GLADIATOR_CERT_CID || 'bafybeiba2j4g34bizjjm26qznc2pf4upgotffrcwjtkw6lj3qa6squrzpu' }}
          IPFS_GLADIATOR_NOTICE_CID: ${{ vars.IPFS_GLADIATOR_NOTICE_CID || 'bafkreifbikc26xs2cu2mvsghzlrginwm6icqotdp4ntsvq3sn6h4flrhhm' }}
          IPFS_MR_ARTICLES_CID: ${{ vars.IPFS_MR_ARTICLES_CID || 'bafkreifxiesrze736sxhvsa5op64q6f3ddvv3rismnvd75wi3yfqilu4py' }}
          IPFS_MR_EIN_LETTER_CID: ${{ vars.IPFS_MR_EIN_LETTER_CID || 'bafkreihz5zpp33pimzckaey64mht2vezlbzngoxe46urrfctzqvjvsdboe' }}
          IPFS_SLAPS_ARTICLES_CID: ${{ vars.IPFS_SLAPS_ARTICLES_CID || 'bafkreic3n6bdf25tobljqbjxzvzkbch6s7xkqq5yehmyt3zju4de7ey52u' }}
          IPFS_SLAPS_EIN_LETTER_CID: ${{ vars.IPFS_SLAPS_EIN_LETTER_CID || 'bafkreifnuwchbvbolmhbgionvsltdi3edzasfqytd4zzqlvu42m5m4jhei' }}
          IPFS_RBW_EIN_LETTER_CID: ${{ vars.IPFS_RBW_EIN_LETTER_CID || 'bafkreid77fuxwqtwyku5syp3dswmy75rymvxh6v3tf7rfrzqbrizoutxtu' }}
          IPFS_NM_SOS_RECEIPT_CID: ${{ vars.IPFS_NM_SOS_RECEIPT_CID || 'bafkreigjsqx6d47sgqwkjxgtt3qrjnoz3hdth4hqk7qnxflqog2ikjs2kq' }}
          IPFS_BENEFICIAL_OWNER_ID_CID: ${{ vars.IPFS_BENEFICIAL_OWNER_ID_CID || 'bafkreie5spkgxxhmafdqylwyfplx37jqhcjrs3es3neasgcnynzgkg5mzi' }}
          IPFS_PATENTSIGHT_PORTFOLIO_CID: ${{ vars.IPFS_PATENTSIGHT_PORTFOLIO_CID || 'bafkreibxqnmhir5iifpboxdv5ndltm5vnbplso4ndtcuzfnanykudrwdbu' }}
          IPFS_PATENTSIGHT_MR_CID: ${{ vars.IPFS_PATENTSIGHT_MR_CID || 'bafkreihls2yoi265uxzmcmh7wzk2ytyo5yvopmb4jib4blw4nptlchivqm' }}
          IPFS_PATENTSIGHT_SLAPS_CID: ${{ vars.IPFS_PATENTSIGHT_SLAPS_CID || 'bafkreiflmhdsflvv53e24mo2woafdgecpkvfljcbm5heafnzdxzbj5ct4i' }}
          IPFS_IPLYTICS_DECLARATION_CID: ${{ vars.IPFS_IPLYTICS_DECLARATION_CID || 'bafkreiej7wfskl53hxo4j47g55bxjkyyulihovjjtpjvtf264kfoddxc5i' }}
        run: npm run contracts:orchestrate:story

      - name: Generate multi-sig transaction config
        env:
          THIRDWEB_WALLET_ADDRESS: ${{ vars.THIRDWEB_WALLET_ADDRESS || '0xCD67f7e86A1397aBc33C473c58662BEB83b7a667' }}
          COINBASE_WALLET_ADDRESS: ${{ vars.COINBASE_WALLET_ADDRESS || '0xdc2afcd0a97c1e878fdd64497806e52cc530f02a' }}
          UCC1_FILING_HASH: "bafkreialofdl6qhrgyomohyo6giijf7stzl26r6sbvq6gnwakgqpbqoe4a"
          GAS_PRICE_GWEI: "50"
        run: npm run contracts:multisig

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-story-${{ github.run_number }}
          path: |
            deployment-config.story.json
            multisig-transaction.json
            registration-attestation.story.json
            valuation-attestation.json
            yield-summary.json
          retention-days: 90

      - name: Show deployed contract addresses
        run: |
          echo "## Story Protocol Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract | Address |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('deployment-config.story.json'));
            Object.entries(cfg.contracts).forEach(([name, addr]) => {
              console.log('| ' + name + ' | [\`' + addr + '\`](https://www.storyscan.io/address/' + addr + ') |');
            });
          " >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Registration Attestation & Orchestration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('registration-attestation.story.json')) {
              console.log('_Attestation file not generated (orchestration may have been skipped)._');
              process.exit(0);
            }
            const att = JSON.parse(fs.readFileSync('registration-attestation.story.json'));
            console.log('**Status:** ' + att.status);
            console.log('');
            console.log('| Step | Tx Hash |');
            console.log('|------|---------|');
            for (const [key, val] of Object.entries(att.transactions || {})) {
              const hash = val.txHash ? '[\`' + val.txHash.slice(0,12) + '…\`](https://www.storyscan.io/tx/' + val.txHash + ')' : (val.skipped ? '_skipped_' : '_failed_');
              console.log('| ' + key + ' | ' + hash + ' |');
            }
            const rs = att.registryStatus || {};
            console.log('');
            console.log('**SAS registered:** ' + rs.sasRegistered + ' | **SOS registered:** ' + rs.sosRegistered);
          " >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Valuation & Attestation Hashes (Story)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('valuation-attestation.json')) {
              console.log('_valuation-attestation.json not found._');
              process.exit(0);
            }
            const va = JSON.parse(fs.readFileSync('valuation-attestation.json'));
            console.log('### Attestation Type Identifiers');
            console.log('');
            console.log('| Type | Hash |');
            console.log('|------|------|');
            for (const [k, v] of Object.entries(va.attestationTypeIdentifiers || {})) {
              console.log('| ' + k + ' | \`' + v + '\` |');
            }
            console.log('');
            console.log('### IP Valuation Hashes');
            console.log('');
            console.log('| Asset | Present Value (USD) | Valuation Hash |');
            console.log('|-------|--------------------:|----------------|');
            const ipv = va.ipValuationHashes || {};
            if (ipv.millionaireResilience) {
              const mr = ipv.millionaireResilience;
              console.log('| Millionaire Resilience | \$' + mr.presentValue_USD.toLocaleString() + ' | \`' + mr.valuationDataHash + '\` |');
            }
            if (ipv.slapsStreaming) {
              const ss = ipv.slapsStreaming;
              console.log('| SLAPS Streaming | \$' + ss.presentValue_USD.toLocaleString() + ' | \`' + ss.valuationDataHash + '\` |');
            }
            console.log('');
            console.log('### UCC-1 Filing Hash');
            console.log('');
            const ucc = va.ucc1FilingHashes || {};
            console.log('| Field | Value |');
            console.log('|-------|-------|');
            if (ucc.ipfsCid)          console.log('| IPFS CID | \`' + ucc.ipfsCid + '\` |');
            if (ucc.ucc1FilingHash32) console.log('| UCC-1 Filing Hash (bytes32) | \`' + ucc.ucc1FilingHash32 + '\` |');
            if (ucc.ucc1DataHash)     console.log('| UCC-1 Data Hash | \`' + ucc.ucc1DataHash + '\` |');
          " >> "$GITHUB_STEP_SUMMARY"

  deploy-base:
    name: Deploy to Base L2 (Chain 8453)
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
    if: |
      github.event_name == 'push' ||
      (!inputs.dry_run && (inputs.network == 'base' || inputs.network == 'both' || inputs.network == 'all'))
    environment: base-mainnet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download compiled artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-${{ github.sha }}
          path: artifacts/

      - name: Deploy contracts to Base L2
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          # ALCHEMY_API_KEY is also used for Base L2 — the Alchemy Base endpoint is
          # constructed automatically in hardhat.config.cjs when ALCHEMY_API_KEY is set.
          # Falls back to BASE_RPC_URL secret, then the public endpoint.
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || 'https://mainnet.base.org' }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          # Pinata / IPFS credentials — used by deployment scripts that pin or fetch
          # documents from IPFS via the Pinata gateway.
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_GATEWAY_TOKEN: ${{ secrets.PINATA_GATEWAY_TOKEN }}
          PINATA_GATEWAY_NAME: ${{ vars.PINATA_GATEWAY_NAME }}
          # Coinbase CDP credentials — used to authenticate with Coinbase Developer Platform APIs.
          COINBASE_API_KEY_NAME: ${{ secrets.COINBASE_API_KEY_NAME }}
          COINBASE_API_KEY_PRIVATE_KEY: ${{ secrets.COINBASE_API_KEY_PRIVATE_KEY }}
        run: npm run contracts:deploy:base

      - name: Verify contracts on Basescan
        if: inputs.verify || github.event_name == 'push'
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || 'https://mainnet.base.org' }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: npm run contracts:verify:base

      - name: Generate valuation attestation hashes
        run: npm run contracts:attestation-hashes

      - name: Post-deployment orchestration (Base L2)
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || 'https://mainnet.base.org' }}
          UCC1_FILING_HASH: "bafkreialofdl6qhrgyomohyo6giijf7stzl26r6sbvq6gnwakgqpbqoe4a"
          UCC1_AUXILIARY_DOCS: "bafybeidkp74w2idrwkg2qey66uepfaes5ekonxjqt62uztyxawii7yye7y"
          UCC1_FINANCING_STATEMENT_CID: ${{ vars.UCC1_FINANCING_STATEMENT_CID || 'bafkreidomwlsf5wabkvhvf63jq424t65mffhnftd4t6spnmhh5t64jn2bu' }}
          UCC1_FILING_NUMBER: ${{ vars.UCC1_FILING_NUMBER || '20260000078753' }}
          UCC1_JURISDICTION: "New Mexico Secretary of State"
          THIRDWEB_WALLET_ADDRESS: ${{ vars.THIRDWEB_WALLET_ADDRESS || '0xCD67f7e86A1397aBc33C473c58662BEB83b7a667' }}
          COINBASE_WALLET_ADDRESS: ${{ vars.COINBASE_WALLET_ADDRESS || '0xdc2afcd0a97c1e878fdd64497806e52cc530f02a' }}
          COINBASE_API_KEY_NAME: ${{ secrets.COINBASE_API_KEY_NAME }}
          COINBASE_API_KEY_PRIVATE_KEY: ${{ secrets.COINBASE_API_KEY_PRIVATE_KEY }}
          # Thirdweb SDK credentials
          THIRDWEB_CLIENT_ID: ${{ secrets.THIRDWEB_CLIENT_ID }}
          THIRDWEB_SECRET_KEY: ${{ secrets.THIRDWEB_SECRET_KEY }}
          # Pinata / IPFS credentials
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_GATEWAY_TOKEN: ${{ secrets.PINATA_GATEWAY_TOKEN }}
          PINATA_GATEWAY_NAME: ${{ vars.PINATA_GATEWAY_NAME }}
          # Corporate document IPFS CIDs — these are network-agnostic but must be
          # set at the step level because ${{ vars.X || 'default' }} expressions are
          # only supported within job/step env blocks, not at the workflow level.
          IPFS_GLADIATOR_CERT_CID: ${{ vars.IPFS_GLADIATOR_CERT_CID || 'bafybeiba2j4g34bizjjm26qznc2pf4upgotffrcwjtkw6lj3qa6squrzpu' }}
          IPFS_GLADIATOR_NOTICE_CID: ${{ vars.IPFS_GLADIATOR_NOTICE_CID || 'bafkreifbikc26xs2cu2mvsghzlrginwm6icqotdp4ntsvq3sn6h4flrhhm' }}
          IPFS_MR_ARTICLES_CID: ${{ vars.IPFS_MR_ARTICLES_CID || 'bafkreifxiesrze736sxhvsa5op64q6f3ddvv3rismnvd75wi3yfqilu4py' }}
          IPFS_MR_EIN_LETTER_CID: ${{ vars.IPFS_MR_EIN_LETTER_CID || 'bafkreihz5zpp33pimzckaey64mht2vezlbzngoxe46urrfctzqvjvsdboe' }}
          IPFS_SLAPS_ARTICLES_CID: ${{ vars.IPFS_SLAPS_ARTICLES_CID || 'bafkreic3n6bdf25tobljqbjxzvzkbch6s7xkqq5yehmyt3zju4de7ey52u' }}
          IPFS_SLAPS_EIN_LETTER_CID: ${{ vars.IPFS_SLAPS_EIN_LETTER_CID || 'bafkreifnuwchbvbolmhbgionvsltdi3edzasfqytd4zzqlvu42m5m4jhei' }}
          IPFS_RBW_EIN_LETTER_CID: ${{ vars.IPFS_RBW_EIN_LETTER_CID || 'bafkreid77fuxwqtwyku5syp3dswmy75rymvxh6v3tf7rfrzqbrizoutxtu' }}
          IPFS_NM_SOS_RECEIPT_CID: ${{ vars.IPFS_NM_SOS_RECEIPT_CID || 'bafkreigjsqx6d47sgqwkjxgtt3qrjnoz3hdth4hqk7qnxflqog2ikjs2kq' }}
          IPFS_BENEFICIAL_OWNER_ID_CID: ${{ vars.IPFS_BENEFICIAL_OWNER_ID_CID || 'bafkreie5spkgxxhmafdqylwyfplx37jqhcjrs3es3neasgcnynzgkg5mzi' }}
          IPFS_PATENTSIGHT_PORTFOLIO_CID: ${{ vars.IPFS_PATENTSIGHT_PORTFOLIO_CID || 'bafkreibxqnmhir5iifpboxdv5ndltm5vnbplso4ndtcuzfnanykudrwdbu' }}
          IPFS_PATENTSIGHT_MR_CID: ${{ vars.IPFS_PATENTSIGHT_MR_CID || 'bafkreihls2yoi265uxzmcmh7wzk2ytyo5yvopmb4jib4blw4nptlchivqm' }}
          IPFS_PATENTSIGHT_SLAPS_CID: ${{ vars.IPFS_PATENTSIGHT_SLAPS_CID || 'bafkreiflmhdsflvv53e24mo2woafdgecpkvfljcbm5heafnzdxzbj5ct4i' }}
          IPFS_IPLYTICS_DECLARATION_CID: ${{ vars.IPFS_IPLYTICS_DECLARATION_CID || 'bafkreiej7wfskl53hxo4j47g55bxjkyyulihovjjtpjvtf264kfoddxc5i' }}
          # Morpho Blue parameters
          MORPHO_BLUE: ${{ vars.MORPHO_BLUE || '0xBBBBBbbBBb9cC5e90e3b3Af64bdAF62C37EEFFCb' }}
          BASE_USDC: ${{ vars.BASE_USDC || '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913' }}
          BTC_LOAN_AMOUNT: ${{ vars.BTC_LOAN_AMOUNT || '5000000000000' }}
          ETH_LOAN_AMOUNT: ${{ vars.ETH_LOAN_AMOUNT || '1000000000000' }}
          BTC_LOAN_APR: ${{ vars.BTC_LOAN_APR || '400' }}
          ETH_LOAN_APR: ${{ vars.ETH_LOAN_APR || '600' }}
          MORPHO_LLTV: ${{ vars.MORPHO_LLTV || '860000000000000000' }}
        run: npm run contracts:orchestrate:base

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-base-${{ github.run_number }}
          path: |
            deployment-config.base.json
            registration-attestation.base.json
            valuation-attestation.json
            yield-summary.json
          retention-days: 90

      - name: Show deployed contract addresses
        run: |
          echo "## Base L2 Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract | Address |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('deployment-config.base.json'));
            Object.entries(cfg.contracts).forEach(([name, addr]) => {
              console.log('| ' + name + ' | [\`' + addr + '\`](https://basescan.org/address/' + addr + ') |');
            });
          " >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Registration Attestation & Orchestration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('registration-attestation.base.json')) {
              console.log('_Attestation file not generated (orchestration may have been skipped)._');
              process.exit(0);
            }
            const att = JSON.parse(fs.readFileSync('registration-attestation.base.json'));
            console.log('**Status:** ' + att.status);
            console.log('');
            console.log('| Step | Tx Hash |');
            console.log('|------|---------|');
            for (const [key, val] of Object.entries(att.transactions || {})) {
              const hash = val.txHash ? '[\`' + val.txHash.slice(0,12) + '…\`](https://basescan.org/tx/' + val.txHash + ')' : (val.skipped ? '_skipped_' : '_failed_');
              console.log('| ' + key + ' | ' + hash + ' |');
            }
            const rs = att.registryStatus || {};
            console.log('');
            console.log('**SAS registered:** ' + rs.sasRegistered + ' | **SOS registered:** ' + rs.sosRegistered);
          " >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Valuation & Attestation Hashes (Base)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('valuation-attestation.json')) {
              console.log('_valuation-attestation.json not found._');
              process.exit(0);
            }
            const va = JSON.parse(fs.readFileSync('valuation-attestation.json'));
            console.log('### Attestation Type Identifiers');
            console.log('');
            console.log('| Type | Hash |');
            console.log('|------|------|');
            for (const [k, v] of Object.entries(va.attestationTypeIdentifiers || {})) {
              console.log('| ' + k + ' | \`' + v + '\` |');
            }
            console.log('');
            console.log('### IP Valuation Hashes');
            console.log('');
            console.log('| Asset | Present Value (USD) | Valuation Hash |');
            console.log('|-------|--------------------:|----------------|');
            const ipv = va.ipValuationHashes || {};
            if (ipv.millionaireResilience) {
              const mr = ipv.millionaireResilience;
              console.log('| Millionaire Resilience | \$' + mr.presentValue_USD.toLocaleString() + ' | \`' + mr.valuationDataHash + '\` |');
            }
            if (ipv.slapsStreaming) {
              const ss = ipv.slapsStreaming;
              console.log('| SLAPS Streaming | \$' + ss.presentValue_USD.toLocaleString() + ' | \`' + ss.valuationDataHash + '\` |');
            }
            console.log('');
            console.log('### UCC-1 Filing Hash');
            console.log('');
            const ucc = va.ucc1FilingHashes || {};
            console.log('| Field | Value |');
            console.log('|-------|-------|');
            if (ucc.ipfsCid)          console.log('| IPFS CID | \`' + ucc.ipfsCid + '\` |');
            if (ucc.ucc1FilingHash32) console.log('| UCC-1 Filing Hash (bytes32) | \`' + ucc.ucc1FilingHash32 + '\` |');
            if (ucc.ucc1DataHash)     console.log('| UCC-1 Data Hash | \`' + ucc.ucc1DataHash + '\` |');
          " >> "$GITHUB_STEP_SUMMARY"

  deploy-mainnet:
    name: Deploy to Ethereum Mainnet (Chain 1)
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
    if: |
      !inputs.dry_run &&
      (inputs.network == 'mainnet' || inputs.network == 'all')
    environment: eth-mainnet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download compiled artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-${{ github.sha }}
          path: artifacts/

      - name: Deploy contracts to Ethereum Mainnet
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          # ALCHEMY_API_KEY is used for the Alchemy Ethereum mainnet endpoint.
          # Falls back to MAINNET_RPC_URL secret, then the public Cloudflare endpoint.
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || 'https://cloudflare-eth.com' }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: npm run contracts:deploy:mainnet

      - name: Verify contracts on Etherscan
        if: inputs.verify
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || 'https://cloudflare-eth.com' }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: npm run contracts:verify:mainnet

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-mainnet-${{ github.run_number }}
          path: |
            deployment-config.mainnet.json
          retention-days: 90

      - name: Show deployed contract addresses
        run: |
          echo "## Ethereum Mainnet Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract | Address |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('deployment-config.mainnet.json'));
            Object.entries(cfg.contracts).forEach(([name, addr]) => {
              console.log('| ' + name + ' | [\`' + addr + '\`](https://etherscan.io/address/' + addr + ') |');
            });
          " >> "$GITHUB_STEP_SUMMARY"

  dry-run:
    name: "Dry Run — Compile Only"
    runs-on: ubuntu-latest
    needs: compile
    permissions: {}
    if: inputs.dry_run
    steps:
      - name: Confirm dry-run success
        run: |
          echo "## ✓ Dry Run Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All 11 contracts compiled successfully." >> "$GITHUB_STEP_SUMMARY"
          echo "Set **Dry run** to _false_ and re-run to deploy." >> "$GITHUB_STEP_SUMMARY"
