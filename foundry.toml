# Foundry Configuration for Millionaire Resilience LLC
# Dual compilation support: Hardhat + Foundry
#
# Foundry provides:
#   - Faster compilation
#   - Built-in fuzz testing
#   - cast CLI for blockchain interactions
#   - anvil for local testing

[profile.default]
# Source directories
src = "contracts"
out = "out"
libs = ["node_modules"]
test = "test/foundry"
script = "script"

# Solidity compiler settings (match hardhat.config.cjs)
solc = "0.8.26"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200

# Build settings
auto_detect_solc = false
offline = false
force = false
bytecode_hash = "ipfs"

# Testing settings
fuzz = { runs = 256, max_test_rejects = 65536 }
invariant = { runs = 256, depth = 15 }

# Gas reporting
gas_reports = ["*"]

# Formatter
fmt = { line_length = 120, tab_width = 4, bracket_spacing = true }

# Remappings (match node_modules structure)
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "@story-protocol/=node_modules/@story-protocol/",
    "forge-std/=node_modules/forge-std/src/"
]

# ============================================================
# Story Protocol Profile (runs=1 for large contracts)
# ============================================================
[profile.story]
src = "contracts"
out = "out-story"
optimizer_runs = 1
via_ir = true
evm_version = "cancun"

# Used for StoryAttestationService (>23KB)
# Reduces bytecode size at cost of higher gas

# ============================================================
# CI Profile (strict checks)
# ============================================================
[profile.ci]
fuzz = { runs = 10000 }
verbosity = 4
deny_warnings = true

# ============================================================
# RPC Endpoints
# ============================================================
[rpc_endpoints]
# Story Protocol
story = "${STORY_RPC_URL}"
story_mainnet = "https://mainnet.storyrpc.io"
story_testnet = "https://odyssey.storyrpc.io"

# Base
base = "${BASE_RPC_URL}"
base_mainnet = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"

# Ethereum
mainnet = "https://cloudflare-eth.com"
sepolia = "https://rpc.sepolia.org"

# Local
localhost = "http://127.0.0.1:8545"
anvil = "http://127.0.0.1:8545"

# ============================================================
# Etherscan API Keys (for verification)
# ============================================================
[etherscan]
story = { key = "${STORYSCAN_API_KEY}", url = "https://www.storyscan.io/api" }
base = { key = "${ETHERSCAN_API_KEY}", url = "https://api.basescan.org/api" }
mainnet = { key = "${ETHERSCAN_API_KEY}" }

# ============================================================
# Documentation
# ============================================================
[doc]
out = "docs"
repository = "https://github.com/slaps6331-cell/Millionaire-Resilience-LLC-JAH"
