# Azure DevOps CD Pipeline for Smart Contract Deployment
# Millionaire Resilience LLC - Continuous Deployment
#
# Triggers: Successful CI, Tags, Manual
# Stages: Multi-Sig → Testnet → Mainnet → Post-Deploy

trigger: none  # CD is triggered manually or by CI completion

resources:
  pipelines:
    - pipeline: CI
      source: 'Millionaire-Resilience-CI'
      trigger:
        branches:
          include:
            - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: blockchain-secrets
  - group: blockchain-config
  - name: NODE_VERSION
    value: '20.x'

stages:
  # ============================================================
  # STAGE 1: Multi-Signature Verification
  # ============================================================
  - stage: MultiSigVerification
    displayName: 'Multi-Signature Verification'
    jobs:
      - job: VerifySignatures
        displayName: 'Verify 2/2 Signatures'
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download CI Artifacts'
            inputs:
              buildType: 'specific'
              project: '$(System.TeamProjectId)'
              definition: 'Millionaire-Resilience-CI'
              buildVersionToDownload: 'latest'
              artifactName: 'deployment-package'
              targetPath: '$(Pipeline.Workspace)/deployment'

          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - script: |
              echo "============================================================"
              echo "Verifying Multi-Signature Configuration"
              echo "============================================================"
              
              cd $(Pipeline.Workspace)/deployment
              npm ci --legacy-peer-deps
              
              # Check if signature file exists
              if [ ! -f "signature-morpho-config.json" ]; then
                echo "##vso[task.logissue type=error]signature-morpho-config.json not found"
                echo "##vso[task.logissue type=error]Run 'node scripts/anchor-signature.cjs' and sign with both wallets"
                exit 1
              fi
              
              # Display signature status
              echo ""
              echo "Signature Configuration:"
              cat signature-morpho-config.json | python3 -c "
              import json, sys
              config = json.load(sys.stdin)
              print(f\"  EIP-191 Hash: {config.get('eip191Hash', 'NOT SET')}\")
              sigs = config.get('signatures', {})
              story_sig = sigs.get('story')
              coinbase_sig = sigs.get('coinbase')
              print(f\"  Story Deployer:  {'✓ SIGNED' if story_sig else '❌ NOT SIGNED'}\")
              print(f\"  Coinbase Wallet: {'✓ SIGNED' if coinbase_sig else '❌ NOT SIGNED'}\")
              "
            displayName: 'Check Signature File'

          - script: |
              echo "============================================================"
              echo "Running Signature Verification"
              echo "============================================================"
              
              cd $(Pipeline.Workspace)/deployment
              
              # Run verification script
              node scripts/verify-multisig.cjs
              VERIFY_EXIT=$?
              
              if [ $VERIFY_EXIT -ne 0 ]; then
                echo ""
                echo "##vso[task.logissue type=error]Multi-signature verification FAILED"
                echo "##vso[task.logissue type=error]Both wallets must sign before deployment can proceed"
                echo ""
                echo "Required Signers:"
                echo "  1. Story Deployer: 0x597856e93f19877a399f686D2F43b298e2268618"
                echo "  2. Coinbase Wallet: 0xDc2aFCd0a97c1e878FdD64497806E52Cc530f02a"
                exit 1
              fi
              
              echo ""
              echo "============================================================"
              echo "✓ 2/2 SIGNATURES VERIFIED"
              echo "============================================================"
            displayName: 'Verify Signatures'

  # ============================================================
  # STAGE 2: Deploy to Testnet
  # ============================================================
  - stage: DeployTestnet
    displayName: 'Deploy to Testnet'
    dependsOn: MultiSigVerification
    condition: succeeded()
    jobs:
      - deployment: DeployStoryTestnet
        displayName: 'Deploy to Story Odyssey'
        environment: 'story-testnet'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NodeTool@0
                  inputs:
                    versionSpec: '$(NODE_VERSION)'

                - script: |
                    cd $(Pipeline.Workspace)/deployment
                    npm ci --legacy-peer-deps
                  displayName: 'Install dependencies'

                - task: AzureKeyVault@2
                  displayName: 'Fetch Secrets from Key Vault'
                  inputs:
                    azureSubscription: 'Azure-Blockchain-Connection'
                    KeyVaultName: 'kv-blockchain-deploy'
                    SecretsFilter: 'deployer-private-key,storyscan-api-key,alchemy-api-key'
                    RunAsPreJob: true

                - script: |
                    echo "============================================================"
                    echo "Deploying to Story Odyssey (Testnet)"
                    echo "============================================================"
                    
                    cd $(Pipeline.Workspace)/deployment
                    
                    export DEPLOYER_PRIVATE_KEY="$(deployer-private-key)"
                    export STORYSCAN_API_KEY="$(storyscan-api-key)"
                    export STORY_RPC_URL="https://odyssey.storyrpc.io"
                    
                    # Deploy to testnet
                    npx hardhat run scripts/deploy.cjs --network story-testnet 2>&1 | tee deploy-story-testnet.log
                    
                    echo ""
                    echo "✓ Story Odyssey deployment complete"
                  displayName: 'Deploy to Story Testnet'

      - deployment: DeployBaseTestnet
        displayName: 'Deploy to Base Sepolia'
        environment: 'base-testnet'
        dependsOn: DeployStoryTestnet
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NodeTool@0
                  inputs:
                    versionSpec: '$(NODE_VERSION)'

                - script: |
                    cd $(Pipeline.Workspace)/deployment
                    npm ci --legacy-peer-deps
                  displayName: 'Install dependencies'

                - task: AzureKeyVault@2
                  displayName: 'Fetch Secrets from Key Vault'
                  inputs:
                    azureSubscription: 'Azure-Blockchain-Connection'
                    KeyVaultName: 'kv-blockchain-deploy'
                    SecretsFilter: 'deployer-private-key,etherscan-api-key'
                    RunAsPreJob: true

                - script: |
                    echo "============================================================"
                    echo "Deploying to Base Sepolia (Testnet)"
                    echo "============================================================"
                    
                    cd $(Pipeline.Workspace)/deployment
                    
                    export DEPLOYER_PRIVATE_KEY="$(deployer-private-key)"
                    export ETHERSCAN_API_KEY="$(etherscan-api-key)"
                    export BASE_RPC_URL="https://sepolia.base.org"
                    
                    # Deploy to testnet
                    npx hardhat run scripts/deploy.cjs --network base-testnet 2>&1 | tee deploy-base-testnet.log
                    
                    echo ""
                    echo "✓ Base Sepolia deployment complete"
                  displayName: 'Deploy to Base Testnet'

  # ============================================================
  # STAGE 3: Integration Tests
  # ============================================================
  - stage: IntegrationTests
    displayName: 'Integration Tests'
    dependsOn: DeployTestnet
    condition: succeeded()
    jobs:
      - job: RunIntegrationTests
        displayName: 'Run Integration Tests'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - script: |
              echo "============================================================"
              echo "Running Integration Tests on Testnet"
              echo "============================================================"
              
              # Run integration tests against deployed testnet contracts
              npm ci --legacy-peer-deps
              npx hardhat test test/integration/*.js --network story-testnet || true
              
              echo ""
              echo "Integration tests complete"
            displayName: 'Integration Tests'
            continueOnError: true

  # ============================================================
  # STAGE 4: Deploy to Mainnet (Manual Approval Required)
  # ============================================================
  - stage: DeployMainnet
    displayName: 'Deploy to Mainnet'
    dependsOn: IntegrationTests
    condition: succeeded()
    jobs:
      - deployment: DeployStoryMainnet
        displayName: 'Deploy to Story Protocol (1514)'
        environment: 'story-mainnet'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NodeTool@0
                  inputs:
                    versionSpec: '$(NODE_VERSION)'

                - script: |
                    cd $(Pipeline.Workspace)/deployment
                    npm ci --legacy-peer-deps
                  displayName: 'Install dependencies'

                - task: AzureKeyVault@2
                  displayName: 'Fetch Secrets from Key Vault'
                  inputs:
                    azureSubscription: 'Azure-Blockchain-Connection'
                    KeyVaultName: 'kv-blockchain-deploy'
                    SecretsFilter: 'deployer-private-key,storyscan-api-key,alchemy-api-key,pinata-jwt'
                    RunAsPreJob: true

                - script: |
                    echo "============================================================"
                    echo "Deploying to Story Protocol MAINNET (Chain 1514)"
                    echo "============================================================"
                    echo ""
                    echo "⚠️  THIS IS A MAINNET DEPLOYMENT"
                    echo "⚠️  Real funds will be used for gas"
                    echo ""
                    
                    cd $(Pipeline.Workspace)/deployment
                    
                    # Set environment variables from Key Vault
                    export DEPLOYER_PRIVATE_KEY="$(deployer-private-key)"
                    export STORYSCAN_API_KEY="$(storyscan-api-key)"
                    export ALCHEMY_API_KEY="$(alchemy-api-key)"
                    export STORY_RPC_URL="https://mainnet.storyrpc.io"
                    
                    # Check balance before deployment
                    echo "Checking deployer balance..."
                    node -e "
                    const { ethers } = require('ethers');
                    const provider = new ethers.JsonRpcProvider('https://mainnet.storyrpc.io');
                    provider.getBalance('0x597856e93f19877a399f686D2F43b298e2268618')
                      .then(b => console.log('Balance: ' + ethers.formatEther(b) + ' IP'));
                    "
                    
                    # Deploy contracts
                    echo ""
                    echo "Starting deployment..."
                    npx hardhat run scripts/deploy.cjs --network story 2>&1 | tee deploy-story-mainnet.log
                    
                    # Verify contracts
                    echo ""
                    echo "Verifying contracts on StoryScan..."
                    npx hardhat run scripts/verify.cjs --network story 2>&1 | tee verify-story.log || true
                    
                    # Copy deployment config
                    cp deployment-config.story.json $(Build.ArtifactStagingDirectory)/ 2>/dev/null || true
                    
                    echo ""
                    echo "============================================================"
                    echo "✓ STORY PROTOCOL MAINNET DEPLOYMENT COMPLETE"
                    echo "============================================================"
                  displayName: 'Deploy to Story Mainnet'

                - task: PublishPipelineArtifact@1
                  displayName: 'Publish Story Deployment Config'
                  inputs:
                    targetPath: '$(Build.ArtifactStagingDirectory)'
                    artifact: 'story-deployment'
                  condition: always()

      - deployment: DeployBaseMainnet
        displayName: 'Deploy to Base L2 (8453)'
        environment: 'base-mainnet'
        dependsOn: DeployStoryMainnet
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NodeTool@0
                  inputs:
                    versionSpec: '$(NODE_VERSION)'

                - script: |
                    cd $(Pipeline.Workspace)/deployment
                    npm ci --legacy-peer-deps
                  displayName: 'Install dependencies'

                - task: AzureKeyVault@2
                  displayName: 'Fetch Secrets from Key Vault'
                  inputs:
                    azureSubscription: 'Azure-Blockchain-Connection'
                    KeyVaultName: 'kv-blockchain-deploy'
                    SecretsFilter: 'deployer-private-key,etherscan-api-key,pinata-jwt'
                    RunAsPreJob: true

                - script: |
                    echo "============================================================"
                    echo "Deploying to Base L2 MAINNET (Chain 8453)"
                    echo "============================================================"
                    echo ""
                    echo "⚠️  THIS IS A MAINNET DEPLOYMENT"
                    echo "⚠️  Real funds will be used for gas"
                    echo ""
                    
                    cd $(Pipeline.Workspace)/deployment
                    
                    # Set environment variables from Key Vault
                    export DEPLOYER_PRIVATE_KEY="$(deployer-private-key)"
                    export ETHERSCAN_API_KEY="$(etherscan-api-key)"
                    export BASE_RPC_URL="https://mainnet.base.org"
                    
                    # Check balance before deployment
                    echo "Checking deployer balance..."
                    node -e "
                    const { ethers } = require('ethers');
                    const provider = new ethers.JsonRpcProvider('https://mainnet.base.org');
                    provider.getBalance('0x597856e93f19877a399f686D2F43b298e2268618')
                      .then(b => console.log('Balance: ' + ethers.formatEther(b) + ' ETH'));
                    "
                    
                    # Deploy contracts
                    echo ""
                    echo "Starting deployment..."
                    npx hardhat run scripts/deploy.cjs --network base 2>&1 | tee deploy-base-mainnet.log
                    
                    # Verify contracts
                    echo ""
                    echo "Verifying contracts on BaseScan..."
                    npx hardhat run scripts/verify.cjs --network base 2>&1 | tee verify-base.log || true
                    
                    # Copy deployment config
                    cp deployment-config.base.json $(Build.ArtifactStagingDirectory)/ 2>/dev/null || true
                    
                    echo ""
                    echo "============================================================"
                    echo "✓ BASE L2 MAINNET DEPLOYMENT COMPLETE"
                    echo "============================================================"
                  displayName: 'Deploy to Base Mainnet'

                - task: PublishPipelineArtifact@1
                  displayName: 'Publish Base Deployment Config'
                  inputs:
                    targetPath: '$(Build.ArtifactStagingDirectory)'
                    artifact: 'base-deployment'
                  condition: always()

  # ============================================================
  # STAGE 5: Post-Deployment Orchestration
  # ============================================================
  - stage: PostDeployment
    displayName: 'Post-Deployment'
    dependsOn: DeployMainnet
    condition: succeeded()
    jobs:
      - job: Orchestration
        displayName: 'Post-Deployment Orchestration'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: 'deployment-package'
              path: '$(Pipeline.Workspace)/deployment'

          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: 'story-deployment'
              path: '$(Pipeline.Workspace)/story'
            continueOnError: true

          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: 'base-deployment'
              path: '$(Pipeline.Workspace)/base'
            continueOnError: true

          - task: AzureKeyVault@2
            displayName: 'Fetch Secrets from Key Vault'
            inputs:
              azureSubscription: 'Azure-Blockchain-Connection'
              KeyVaultName: 'kv-blockchain-deploy'
              SecretsFilter: 'deployer-private-key,pinata-jwt,pinata-api-key,pinata-secret-key'
              RunAsPreJob: true

          - script: |
              echo "============================================================"
              echo "Running Post-Deployment Orchestration"
              echo "============================================================"
              
              cd $(Pipeline.Workspace)/deployment
              npm ci --legacy-peer-deps
              
              export DEPLOYER_PRIVATE_KEY="$(deployer-private-key)"
              export PINATA_JWT="$(pinata-jwt)"
              export PINATA_API_KEY="$(pinata-api-key)"
              export PINATA_SECRET_API_KEY="$(pinata-secret-key)"
              
              # Copy deployment configs
              cp $(Pipeline.Workspace)/story/deployment-config.story.json . 2>/dev/null || true
              cp $(Pipeline.Workspace)/base/deployment-config.base.json . 2>/dev/null || true
              
              # Run Story Protocol orchestration
              echo ""
              echo "[1/4] Running Story Protocol orchestration..."
              npx hardhat run scripts/post-deploy-orchestrate.cjs --network story || true
              
              # Run Base orchestration
              echo ""
              echo "[2/4] Running Base L2 orchestration..."
              npx hardhat run scripts/post-deploy-orchestrate.cjs --network base || true
              
              # Record UCC-1 filing
              echo ""
              echo "[3/4] Recording UCC-1 filing on-chain..."
              npm run contracts:record-ucc1:story 2>/dev/null || true
              npm run contracts:record-ucc1:base 2>/dev/null || true
              
              # Export and pin ABI proof
              echo ""
              echo "[4/4] Exporting and pinning ABI proof to IPFS..."
              node scripts/export-abi-proof.cjs || true
              npm run contracts:pin-to-pinata 2>/dev/null || true
              
              echo ""
              echo "============================================================"
              echo "✓ POST-DEPLOYMENT ORCHESTRATION COMPLETE"
              echo "============================================================"
            displayName: 'Run Orchestration'

          - script: |
              echo "============================================================"
              echo "Generating Deployment Report"
              echo "============================================================"
              
              cd $(Pipeline.Workspace)/deployment
              
              # Create deployment report
              cat > deployment-report.md << 'EOF'
              # Deployment Report
              
              **Build:** $(Build.BuildNumber)
              **Date:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
              **Commit:** $(Build.SourceVersion)
              
              ## Story Protocol (Chain 1514)
              EOF
              
              if [ -f "deployment-config.story.json" ]; then
                echo '```json' >> deployment-report.md
                cat deployment-config.story.json >> deployment-report.md
                echo '```' >> deployment-report.md
              else
                echo "No deployment config found" >> deployment-report.md
              fi
              
              echo "" >> deployment-report.md
              echo "## Base L2 (Chain 8453)" >> deployment-report.md
              
              if [ -f "deployment-config.base.json" ]; then
                echo '```json' >> deployment-report.md
                cat deployment-config.base.json >> deployment-report.md
                echo '```' >> deployment-report.md
              else
                echo "No deployment config found" >> deployment-report.md
              fi
              
              echo ""
              echo "Deployment report generated"
              cp deployment-report.md $(Build.ArtifactStagingDirectory)/
            displayName: 'Generate Report'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Deployment Report'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact: 'deployment-report'

  # ============================================================
  # STAGE 6: Notifications
  # ============================================================
  - stage: Notifications
    displayName: 'Send Notifications'
    dependsOn: PostDeployment
    condition: always()
    jobs:
      - job: SendNotifications
        displayName: 'Send Deployment Notifications'
        steps:
          - script: |
              echo "============================================================"
              echo "Deployment Pipeline Complete"
              echo "============================================================"
              echo ""
              echo "Build:   $(Build.BuildNumber)"
              echo "Status:  ${{ variables['Agent.JobStatus'] }}"
              echo "Branch:  $(Build.SourceBranchName)"
              echo "Commit:  $(Build.SourceVersion)"
              echo ""
              echo "Explorers:"
              echo "  Story Protocol: https://www.storyscan.io"
              echo "  Base L2:        https://basescan.org"
              echo ""
              
              # Send webhook notification (if configured)
              if [ -n "$(WEBHOOK_URL)" ]; then
                curl -X POST "$(WEBHOOK_URL)" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "build": "$(Build.BuildNumber)",
                    "status": "${{ variables['Agent.JobStatus'] }}",
                    "branch": "$(Build.SourceBranchName)"
                  }' || true
              fi
            displayName: 'Send Notifications'
